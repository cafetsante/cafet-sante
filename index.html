<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cafet Santé</title>
  <meta name="theme-color" content="#2f6f93">
  <meta name="apple-mobile-web-app-title" content="Cafet Santé">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f8fb;
      color: #245978;
      font-family: Arial, sans-serif;
    }
    main {
      width: min(92%, 520px);
      padding: 32px;
      text-align: center;
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(36, 89, 120, .15);
    }
    img {
      width: 220px;
      max-width: 70%;
      height: auto;
    }
    h1 { margin: 18px 0 8px; }
    p { color: #5f6368; line-height: 1.5; }
  </style>
</head>
<body>
  <main>
    <img src="icon-512.png" alt="Logo Cafet Santé">
    <h1>Cafet Santé</h1>
    <p>Ressources graphiques officielles de l’application bénévole.</p>
  </main>
</body>
</html>
